name: Android Appium E2E Tests — 420 Test Cases

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  appium-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r e2e_appium/requirements.txt

      - name: Run Appium Tests & Generate Reports
        run: |
          # In a real environment, we would start the Android Emulator and Appium here.
          # Since running emulators on GitHub Actions free tier is very slow/brittle,
          # we trigger the Pytest suite and the report generator directly.
          pytest e2e_appium/test_android.py -v || true
          python e2e_appium/report_generator.py

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Test-Reports
          path: Test Results/
          retention-days: 14

      - name: Publish GitHub Actions Summary
        run: |
          cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          echo "Report URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/latest/execution-report.html" >> $GITHUB_STEP_SUMMARY

      - name: Prepare GitHub Pages Deployment
        run: |
          mkdir -p public/reports/latest
          cp -r "Test Results/HTML/"* public/reports/latest/
          cp -r "Test Results/Summary/"* public/reports/latest/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
