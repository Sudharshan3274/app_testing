name: Deploy to GitHub Pages and Run Selenium E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# ─── Top-level permissions needed by actions/deploy-pages ────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on new pushes
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build the React application and deploy it to GitHub Pages
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React Application
        working-directory: frontend
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact (dist folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Wait for GitHub Pages to be live, then run Selenium E2E tests
  # ─────────────────────────────────────────────────────────────────────────────
  selenium-tests:
    name: Selenium E2E Tests (Live GitHub Pages)
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install -r e2e_selenium/requirements.txt

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update -y
          sudo apt-get install -y google-chrome-stable
          # ChromeDriver is managed automatically by selenium >= 4.10

      - name: Wait for GitHub Pages Deployment to be Live
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.page_url }}
        run: |
          echo "Target URL: $BASE_URL"
          echo "Polling for HTTP 200 (max 2 minutes)..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL" || echo "000")
            echo "Attempt $i / 24 → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Deployment is live!"
              break
            fi
            if [ "$i" -eq "24" ]; then
              echo "⚠️  Site did not return 200 after 24 attempts — proceeding anyway."
            fi
            sleep 5
          done

      - name: Run Selenium E2E Tests
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.page_url }}
        run: |
          echo "Running Selenium tests against: $BASE_URL"
          pytest e2e_selenium/ -v --tb=short 2>&1 | tee "selenium-output.log" || true

      - name: Generate Test Reports
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.page_url }}
        run: python e2e_selenium/report_generator.py

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-Test-Reports-${{ github.run_number }}
          path: |
            Test Results/
            selenium-output.log
          retention-days: 30

      - name: Publish GitHub Actions Summary
        if: always()
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.page_url }}
          BUILD_NUMBER: ${{ github.run_number }}
          EXECUTION_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          REPORT_URL="https://GOVARDHAN9381.github.io/app_test/"
          echo "## 🌐 Live GitHub Pages E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Number** | #$BUILD_NUMBER |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Date** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment URL** | [$BASE_URL]($BASE_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Summary not found — report generator may not have run." >> $GITHUB_STEP_SUMMARY
          fi

